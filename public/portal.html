<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>My Orders — Vvshenok</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="/style.css"/>
<style>
.portal-top{display:flex;align-items:center;justify-content:space-between;padding:0.85rem 1.75rem;border-bottom:1px solid var(--line);background:var(--bg2);position:sticky;top:0;z-index:10;}
.portal-brand{font-family:var(--mono);font-size:0.78rem;color:var(--muted);}
.portal-brand em{color:var(--accent);font-style:normal;}
.portal-user{font-family:var(--mono);font-size:0.68rem;color:var(--dim);}
.portal-body{max-width:860px;margin:2.5rem auto;padding:0 1.75rem;}
.portal-welcome{margin-bottom:2.5rem;}
.portal-welcome h1{font-size:1.5rem;font-weight:700;color:var(--white);margin-bottom:0.35rem;}
.portal-welcome p{font-size:0.85rem;color:var(--muted);}
.order-card{background:var(--bg2);border:1px solid var(--line);border-radius:var(--radius);margin-bottom:1.25rem;overflow:hidden;}
.order-header{padding:1.25rem 1.5rem;display:flex;align-items:center;gap:1rem;cursor:pointer;transition:background .12s;}
.order-header:hover{background:var(--bg3);}
.order-info{flex:1;min-width:0;}
.order-title{font-size:0.95rem;font-weight:600;color:var(--white);margin-bottom:0.2rem;}
.order-meta{font-family:var(--mono);font-size:0.62rem;color:var(--dim);}
.order-status{font-family:var(--mono);font-size:0.62rem;padding:0.2rem 0.6rem;border-radius:20px;flex-shrink:0;}
.status-in_progress{color:#f0b232;border:1px solid rgba(240,178,50,.25);}
.status-completed{color:#23a55a;border:1px solid rgba(35,165,90,.25);}
.status-review{color:#007ACC;border:1px solid rgba(0,122,204,.25);}
.status-on_hold{color:var(--dim);border:1px solid var(--line);}
.progress-wrap{padding:0 1.5rem 0.5rem;}
.progress-label{display:flex;justify-content:space-between;font-family:var(--mono);font-size:0.62rem;color:var(--dim);margin-bottom:0.35rem;}
.progress-track{height:4px;background:var(--bg3);border-radius:2px;overflow:hidden;}
.progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width 1s cubic-bezier(.25,1,.5,1);}
.order-body{border-top:1px solid var(--line);display:none;}
.order-body.open{display:block;}
.order-desc{padding:1.25rem 1.5rem;font-size:0.85rem;color:var(--muted);line-height:1.7;border-bottom:1px solid var(--line);}
.changelog{padding:1.25rem 1.5rem;}
.changelog-title{font-family:var(--mono);font-size:0.62rem;color:var(--dim);letter-spacing:.08em;text-transform:uppercase;margin-bottom:1rem;}
.cl-entry{display:flex;gap:1rem;margin-bottom:1rem;padding-bottom:1rem;border-bottom:1px solid var(--line);}
.cl-entry:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0;}
.cl-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);flex-shrink:0;margin-top:5px;}
.cl-content{flex:1;}
.cl-text{font-size:0.83rem;color:var(--text);line-height:1.6;}
.cl-date{font-family:var(--mono);font-size:0.6rem;color:var(--dim);margin-top:0.3rem;}
.empty-portal{text-align:center;padding:4rem 2rem;}
.empty-portal svg{margin:0 auto 1rem;opacity:.3;}
.empty-portal h2{font-size:1rem;font-weight:600;color:var(--muted);margin-bottom:0.5rem;}
.empty-portal p{font-size:0.82rem;color:var(--dim);line-height:1.7;}
.chevron{transition:transform .2s;flex-shrink:0;color:var(--dim);}
.chevron.open{transform:rotate(180deg);}
</style>
</head>
<body>
<div class="portal-top">
  <div class="portal-brand">vvshenok<em>.dev</em> / portal</div>
  <div style="display:flex;align-items:center;gap:1rem;">
    <a href="/" class="sm-btn" style="text-decoration:none;">← Home</a>
    <div class="portal-user" id="portal-username"></div>
    <button class="sm-btn" onclick="doLogout()">Sign out</button>
  </div>
</div>

<div class="portal-body">
  <div class="portal-welcome">
    <h1>My Orders</h1>
    <p>Track the progress of your projects in real time.</p>
  </div>
  <div id="orders-list"><div class="games-loading">Loading your orders...</div></div>
</div>

<script>
var statusLabels = { in_progress:'In Progress', completed:'Completed', review:'In Review', on_hold:'On Hold' };

(async function() {
  try {
    var r = await fetch('/api/client/me');
    var d = await r.json();
    if (!d.authed) { window.location.href = '/portal-auth'; return; }
    document.getElementById('portal-username').textContent = d.username;
    loadOrders();
  } catch { window.location.href = '/portal-auth'; }
})();

async function loadOrders() {
  try {
    var r = await fetch('/api/client/orders');
    var d = await r.json();
    renderOrders(d.orders || []);
  } catch { document.getElementById('orders-list').innerHTML = '<div class="games-loading">Failed to load orders.</div>'; }
}

function renderOrders(orders) {
  var el = document.getElementById('orders-list');
  if (!orders.length) {
    el.innerHTML = '<div class="empty-portal"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg><h2>No orders yet</h2><p>Once you place a project with Vvshenok, your orders will appear here with live progress updates and changelogs.</p></div>';
    return;
  }
  el.innerHTML = '';
  orders.forEach(function(order) {
    var card = document.createElement('div');
    card.className = 'order-card';
    var statusClass = 'status-' + (order.status || 'in_progress');
    var statusLabel = statusLabels[order.status] || order.status;
    var progress = Number(order.progress) || 0;
    var date = new Date(order.updatedAt || order.createdAt).toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
    var changelog = order.changelog || [];

    var clHtml = '';
    if (changelog.length) {
      clHtml = '<div class="changelog"><div class="changelog-title">Changelog</div>';
      changelog.forEach(function(cl) {
        var d = new Date(cl.ts).toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric', hour:'2-digit', minute:'2-digit' });
        clHtml += '<div class="cl-entry"><div class="cl-dot"></div><div class="cl-content"><div class="cl-text">' + esc(cl.text) + '</div><div class="cl-date">' + d + ' by ' + esc(cl.author || 'Vvshenok') + '</div></div></div>';
      });
      clHtml += '</div>';
    } else {
      clHtml = '<div class="changelog"><div class="changelog-title">Changelog</div><div style="font-family:var(--mono);font-size:.65rem;color:var(--dim);">No updates yet.</div></div>';
    }

    card.innerHTML =
      '<div class="order-header" onclick="toggleOrder(this)">' +
        '<div class="order-info"><div class="order-title">' + esc(order.title) + '</div><div class="order-meta">Updated ' + date + '</div></div>' +
        '<span class="order-status ' + statusClass + '">' + statusLabel + '</span>' +
        '<svg class="chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>' +
      '</div>' +
      '<div class="progress-wrap"><div class="progress-label"><span>Progress</span><span>' + progress + '%</span></div><div class="progress-track"><div class="progress-fill" data-w="' + progress + '" style="width:0"></div></div></div>' +
      '<div class="order-body">' +
        (order.description ? '<div class="order-desc">' + esc(order.description) + '</div>' : '') +
        clHtml +
      '</div>';

    el.appendChild(card);
    setTimeout(function() {
      var fill = card.querySelector('.progress-fill');
      if (fill) fill.style.width = fill.dataset.w + '%';
    }, 100);
  });
}

function toggleOrder(header) {
  var body = header.parentElement.querySelector('.order-body');
  var chevron = header.querySelector('.chevron');
  var open = body.classList.toggle('open');
  chevron.classList.toggle('open', open);
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function doLogout() {
  await fetch('/api/client/logout', { method:'POST' });
  window.location.href = '/portal-auth';
}
</script>
</body>
</html>
