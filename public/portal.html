<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>My Orders — Vvshenok.dev</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="/style.css"/>
<style>
.portal-page { min-height: 100vh; display: flex; flex-direction: column; }
.portal-hero { padding: 7rem 1.75rem 3rem; position: relative; z-index: 10; border-bottom: 1px solid var(--line); }
.portal-hero-inner { max-width: 1080px; margin: 0 auto; display: flex; align-items: flex-end; justify-content: space-between; gap: 2rem; flex-wrap: wrap; }
.portal-hero-left h1 { font-size: clamp(2rem, 5vw, 3.5rem); font-weight: 700; color: var(--white); line-height: 1.1; margin-bottom: 0.5rem; }
.portal-hero-left h1 em { color: var(--accent); font-style: normal; }
.portal-hero-left p { font-size: 0.88rem; color: var(--muted); }
.portal-hero-right { display: flex; gap: 0.75rem; align-items: center; flex-wrap: wrap; }
.portal-user-badge { display: flex; align-items: center; gap: 0.5rem; background: var(--bg2); border: 1px solid var(--line); border-radius: 20px; padding: 0.35rem 0.85rem; font-family: var(--mono); font-size: 0.68rem; color: var(--muted); }
.portal-user-dot { width: 6px; height: 6px; border-radius: 50%; background: #23a55a; flex-shrink: 0; }
.portal-body { max-width: 1080px; margin: 0 auto; padding: 2.5rem 1.75rem 4rem; position: relative; z-index: 10; width: 100%; }
.portal-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: var(--line); border: 1px solid var(--line); border-radius: var(--radius); overflow: hidden; margin-bottom: 2.5rem; }
.portal-stat { background: var(--bg2); padding: 1.25rem 1.5rem; }
.portal-stat-n { font-family: var(--mono); font-size: 1.75rem; font-weight: 500; color: var(--white); letter-spacing: -0.03em; margin-bottom: 0.2rem; }
.portal-stat-l { font-size: 0.68rem; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; }
.portal-section-title { font-size: 0.68rem; font-weight: 600; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 1.25rem; }
.order-card { background: var(--bg2); border: 1px solid var(--line); border-radius: var(--radius); margin-bottom: 1rem; overflow: hidden; transition: border-color 0.15s; }
.order-card:hover { border-color: var(--line2); }
.order-header { padding: 1.25rem 1.5rem; display: flex; align-items: center; gap: 1rem; cursor: pointer; }
.order-info { flex: 1; min-width: 0; }
.order-title { font-size: 0.95rem; font-weight: 600; color: var(--white); margin-bottom: 0.2rem; }
.order-meta { font-family: var(--mono); font-size: 0.62rem; color: var(--dim); }
.order-status { font-family: var(--mono); font-size: 0.62rem; padding: 0.2rem 0.65rem; border-radius: 20px; flex-shrink: 0; }
.status-in_progress { color: #f0b232; border: 1px solid rgba(240,178,50,.25); }
.status-completed { color: #23a55a; border: 1px solid rgba(35,165,90,.25); }
.status-review { color: #007ACC; border: 1px solid rgba(0,122,204,.25); }
.status-on_hold { color: var(--dim); border: 1px solid var(--line); }
.progress-wrap { padding: 0 1.5rem 0.75rem; }
.progress-label { display: flex; justify-content: space-between; font-family: var(--mono); font-size: 0.62rem; color: var(--dim); margin-bottom: 0.35rem; }
.progress-track { height: 4px; background: var(--bg3); border-radius: 2px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 1s cubic-bezier(.25,1,.5,1); }
.order-body { border-top: 1px solid var(--line); display: none; }
.order-body.open { display: block; }
.order-desc { padding: 1.25rem 1.5rem; font-size: 0.85rem; color: var(--muted); line-height: 1.7; border-bottom: 1px solid var(--line); }
.changelog { padding: 1.25rem 1.5rem; }
.changelog-title { font-family: var(--mono); font-size: 0.62rem; color: var(--dim); letter-spacing: .08em; text-transform: uppercase; margin-bottom: 1rem; }
.cl-entry { display: flex; gap: 1rem; margin-bottom: 0.85rem; padding-bottom: 0.85rem; border-bottom: 1px solid var(--line); }
.cl-entry:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
.cl-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); flex-shrink: 0; margin-top: 5px; }
.cl-text { font-size: 0.83rem; color: var(--text); line-height: 1.6; }
.cl-date { font-family: var(--mono); font-size: 0.6rem; color: var(--dim); margin-top: 0.25rem; }
.chevron { transition: transform .2s; flex-shrink: 0; color: var(--dim); }
.chevron.open { transform: rotate(180deg); }
.empty-portal { text-align: center; padding: 5rem 2rem; background: var(--bg2); border: 1px solid var(--line); border-radius: var(--radius); }
.empty-portal h2 { font-size: 1rem; font-weight: 600; color: var(--muted); margin-bottom: 0.5rem; margin-top: 1rem; }
.empty-portal p { font-size: 0.82rem; color: var(--dim); line-height: 1.7; max-width: 360px; margin: 0 auto; }
@media (max-width: 600px) {
  .portal-stats { grid-template-columns: 1fr; }
  .portal-hero-inner { flex-direction: column; align-items: flex-start; }
}
</style>
</head>
<body class="portal-page">

<!-- NAV -->
<nav class="nav">
  <div class="nav-inner">
    <a href="/" class="nav-logo" style="text-decoration:none;">vvshenok<em>.dev</em></a>
    <ul class="nav-links">
      <li><a href="/#games">Games</a></li>
      <li><a href="/#explore">Explore</a></li>
      <li><a href="/#projects">Projects</a></li>
      <li><a href="/#pricing">Pricing</a></li>
      <li><a href="/#contact">Contact</a></li>
    </ul>
    <div class="nav-right">
      <button class="theme-toggle" id="theme-toggle" title="Toggle theme">
        <svg class="icon-moon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        <svg class="icon-sun" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      </button>
      <button class="nav-hamburger" id="nav-hamburger" aria-label="Menu"><span></span><span></span><span></span></button>
    </div>
  </div>
</nav>
<div class="mobile-menu" id="mobile-menu">
  <a href="/" onclick="closeMobileMenu()">Home</a>
  <a href="/#games" onclick="closeMobileMenu()">Games</a>
  <a href="/#explore" onclick="closeMobileMenu()">Explore</a>
  <a href="/#contact" onclick="closeMobileMenu()">Contact</a>
  <a href="#" onclick="doLogout()" style="color:#f55;">Sign out</a>
</div>

<!-- BG -->
<div id="page-bg" style="position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;"></div>
<div id="page-bg-overlay" style="position:fixed;inset:0;z-index:1;pointer-events:none;background:rgba(12,12,12,0.88);"></div>

<!-- HERO -->
<div class="portal-hero">
  <div class="portal-hero-inner">
    <div class="portal-hero-left">
      <h1>My <em>Orders</em></h1>
      <p>Track your projects in real time — progress, updates and changelogs.</p>
    </div>
    <div class="portal-hero-right">
      <div class="portal-user-badge">
        <div class="portal-user-dot"></div>
        <span id="portal-username">Loading...</span>
      </div>
      <a href="/#contact" class="btn btn-ghost" style="font-size:0.75rem;">New project</a>
      <button class="btn btn-ghost" style="font-size:0.75rem;" onclick="doLogout()">Sign out</button>
    </div>
  </div>
</div>

<!-- BODY -->
<div class="portal-body">
  <div class="portal-stats" id="portal-stats" style="display:none;">
    <div class="portal-stat"><div class="portal-stat-n" id="stat-total">0</div><div class="portal-stat-l">Total orders</div></div>
    <div class="portal-stat"><div class="portal-stat-n" id="stat-active">0</div><div class="portal-stat-l">In progress</div></div>
    <div class="portal-stat"><div class="portal-stat-n" id="stat-done">0</div><div class="portal-stat-l">Completed</div></div>
  </div>
  <div class="portal-section-title">Your Projects</div>
  <div id="orders-list"><div class="games-loading">Loading your orders...</div></div>
</div>

<script>
var savedTheme = localStorage.getItem('theme') || 'dark';
document.documentElement.setAttribute('data-theme', savedTheme);
document.getElementById('theme-toggle').addEventListener('click', function() {
  var t = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', t);
  localStorage.setItem('theme', t);
});
document.getElementById('nav-hamburger').addEventListener('click', function() {
  document.getElementById('mobile-menu').classList.toggle('open');
  this.classList.toggle('open');
});
function closeMobileMenu() {
  document.getElementById('mobile-menu').classList.remove('open');
  document.getElementById('nav-hamburger').classList.remove('open');
}

var statusLabels = { in_progress:'In Progress', completed:'Completed', review:'In Review', on_hold:'On Hold' };

(async function() {
  try {
    var r = await fetch('/api/client/me');
    var d = await r.json();
    if (!d.authed) { window.location.href = '/portal-auth'; return; }
    document.getElementById('portal-username').textContent = d.username;
    loadOrders();
  } catch { window.location.href = '/portal-auth'; }
})();

async function loadOrders() {
  try {
    var r = await fetch('/api/client/orders');
    var d = await r.json();
    renderOrders(d.orders || []);
  } catch { document.getElementById('orders-list').innerHTML = '<div class="games-loading">Failed to load orders.</div>'; }
}

function renderOrders(orders) {
  var el = document.getElementById('orders-list');

  // Stats
  if (orders.length) {
    var active = orders.filter(function(o){ return o.status === 'in_progress' || o.status === 'review'; }).length;
    var done = orders.filter(function(o){ return o.status === 'completed'; }).length;
    document.getElementById('stat-total').textContent = orders.length;
    document.getElementById('stat-active').textContent = active;
    document.getElementById('stat-done').textContent = done;
    document.getElementById('portal-stats').style.display = 'grid';
  }

  if (!orders.length) {
    el.innerHTML = '<div class="empty-portal"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" style="margin:0 auto;opacity:.3;"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg><h2>No orders yet</h2><p>Once you place a project with Vvshenok, your orders will show here with live progress and changelogs.</p><a href="/#contact" class="btn btn-solid" style="margin-top:1.5rem;display:inline-flex;">Get in touch</a></div>';
    return;
  }

  el.innerHTML = '';
  orders.forEach(function(order) {
    var card = document.createElement('div');
    card.className = 'order-card';
    var statusClass = 'status-' + (order.status || 'in_progress');
    var statusLabel = statusLabels[order.status] || order.status;
    var progress = Number(order.progress) || 0;
    var date = new Date(order.updatedAt || order.createdAt).toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
    var changelog = order.changelog || [];

    var clHtml = '<div class="changelog"><div class="changelog-title">Changelog</div>';
    if (changelog.length) {
      changelog.forEach(function(cl) {
        var dt = new Date(cl.ts).toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric', hour:'2-digit', minute:'2-digit' });
        clHtml += '<div class="cl-entry"><div class="cl-dot"></div><div><div class="cl-text">' + esc(cl.text) + '</div><div class="cl-date">' + dt + ' by ' + esc(cl.author || 'Vvshenok') + '</div></div></div>';
      });
    } else {
      clHtml += '<div style="font-family:var(--mono);font-size:.65rem;color:var(--dim);">No updates yet.</div>';
    }
    clHtml += '</div>';

    card.innerHTML =
      '<div class="order-header" onclick="toggleOrder(this)">' +
        '<div class="order-info"><div class="order-title">' + esc(order.title) + '</div><div class="order-meta">Updated ' + date + '</div></div>' +
        '<span class="order-status ' + statusClass + '">' + statusLabel + '</span>' +
        '<svg class="chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>' +
      '</div>' +
      '<div class="progress-wrap"><div class="progress-label"><span>Progress</span><span>' + progress + '%</span></div><div class="progress-track"><div class="progress-fill" data-w="' + progress + '" style="width:0"></div></div></div>' +
      '<div class="order-body">' + (order.description ? '<div class="order-desc">' + esc(order.description) + '</div>' : '') + clHtml + '</div>';

    el.appendChild(card);
    setTimeout(function() {
      var fill = card.querySelector('.progress-fill');
      if (fill) fill.style.width = fill.dataset.w + '%';
    }, 100);
  });
}

function toggleOrder(header) {
  var body = header.parentElement.querySelector('.order-body');
  var chevron = header.querySelector('.chevron');
  body.classList.toggle('open');
  chevron.classList.toggle('open', body.classList.contains('open'));
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

async function doLogout() {
  await fetch('/api/client/logout', { method:'POST' });
  window.location.href = '/portal-auth';
}

// Parallax bg
(async function(){
  try {
    var r = await fetch('/api/games');
    var d = await r.json();
    var thumbs = (d.games||[]).filter(function(g){ return g.thumbnail; }).map(function(g){ return g.thumbnail; });
    if (!thumbs.length) return;
    var bg = document.getElementById('page-bg');
    var tileSize=130, gap=18, step=tileSize+gap;
    var cols=Math.ceil(window.innerWidth/step)+4, rows=Math.ceil(window.innerHeight/step)+4;
    var html='', idx=0;
    for (var row=0;row<rows;row++) for (var col=0;col<cols;col++) {
      html+='<div style="position:absolute;left:'+(col*step-80)+'px;top:'+(row*step-80)+'px;width:'+tileSize+'px;height:'+tileSize+'px;overflow:hidden;border-radius:10px;transform:rotate(-12deg);opacity:0.08;"><img src="'+thumbs[idx%thumbs.length]+'" style="width:100%;height:100%;object-fit:cover;display:block;" loading="lazy"/></div>';
      idx++;
    }
    bg.innerHTML = html;
    var tx=0, ty=0, cx=0, cy=0;
    document.addEventListener('mousemove', function(e) {
      tx = (e.clientX - window.innerWidth/2) / window.innerWidth * 20;
      ty = (e.clientY - window.innerHeight/2) / window.innerHeight * 20;
    });
    (function animate(){ cx += (tx-cx)*0.06; cy += (ty-cy)*0.06; bg.style.transform='translate('+cx+'px,'+cy+'px)'; requestAnimationFrame(animate); })();
  } catch{}
})();
</script>
</body>
</html>
