<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Login — Vvshenok</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="/style.css"/>
<style>
.divider{display:flex;align-items:center;gap:0.75rem;margin:1.25rem 0;color:var(--dim);font-family:var(--mono);font-size:0.65rem;letter-spacing:0.06em;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--line);}
.btn-discord{display:flex;align-items:center;justify-content:center;gap:0.6rem;width:100%;background:#5865f2;color:#fff;border:none;border-radius:var(--radius);padding:0.7rem;font-size:0.82rem;font-weight:700;cursor:pointer;text-decoration:none;transition:background 0.15s,transform 0.15s;}
.btn-discord:hover{background:#4752c4;transform:translateY(-1px);}
.discord-icon{width:18px;height:18px;flex-shrink:0;}
.login-err{font-family:var(--mono);font-size:0.7rem;color:#f55;margin-top:0.65rem;min-height:1rem;}
</style>
</head>
<body class="admin-page">
<div class="admin-box">
  <div class="admin-brand">vvshenok<em>.dev</em></div>
  <div class="admin-h">Welcome back</div>
  <div class="admin-sub" id="login-sub">Sign in to continue.</div>

  <a href="/api/auth/discord" class="btn-discord">
    <svg class="discord-icon" viewBox="0 0 127.14 96.36" fill="#fff" xmlns="http://www.w3.org/2000/svg"><path d="M107.7,8.07A105.15,105.15,0,0,0,81.47,0a72.06,72.06,0,0,0-3.36,6.83A97.68,97.68,0,0,0,49,6.83,72.37,72.37,0,0,0,45.64,0,105.89,105.89,0,0,0,19.39,8.09C2.79,32.65-1.71,56.6.54,80.21h0A105.73,105.73,0,0,0,32.71,96.36,77.7,77.7,0,0,0,39.6,85.25a68.42,68.42,0,0,1-10.85-5.18c.91-.66,1.8-1.34,2.66-2a75.57,75.57,0,0,0,64.32,0c.87.71,1.76,1.39,2.66,2a68.68,68.68,0,0,1-10.87,5.19,77,77,0,0,0,6.89,11.1A105.25,105.25,0,0,0,126.6,80.22h0C129.24,52.84,122.09,29.11,107.7,8.07ZM42.45,65.69C36.18,65.69,31,60,31,53s5-12.74,11.43-12.74S54,46,53.89,53,48.84,65.69,42.45,65.69Zm42.24,0C78.41,65.69,73.25,60,73.25,53s5-12.74,11.44-12.74S96.23,46,96.12,53,91.08,65.69,84.69,65.69Z"/></svg>
    Continue with Discord
  </a>

  <div class="divider">or</div>

  <div class="field">
    <label class="field-label" for="u">Username</label>
    <input class="field-input" type="text" id="u" autocomplete="username"/>
  </div>
  <div class="field">
    <label class="field-label" for="p">Password</label>
    <input class="field-input" type="password" id="p" autocomplete="current-password"/>
  </div>
  <button class="btn btn-solid" id="login-btn" onclick="doLogin()" style="width:100%;justify-content:center;margin-top:0.25rem;">Sign in</button>
  <div class="login-err" id="err"></div>
</div>
<script>
(async function(){
  try{
    const r=await fetch('/api/admin/check');
    const d=await r.json();
    if(d.authed) window.location.href='/dashboard';
  }catch{}
  const params=new URLSearchParams(window.location.search);
  const err=params.get('error');
  if(err==='not_authorized') document.getElementById('err').textContent='Your Discord account is not authorized.';
  else if(err==='token_failed') document.getElementById('err').textContent='Discord login failed. Try again.';
  else if(err) document.getElementById('err').textContent='Login failed. Try again.';
})();

document.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});

async function doLogin(){
  const u=document.getElementById('u').value.trim();
  const p=document.getElementById('p').value;
  const err=document.getElementById('err');
  const btn=document.getElementById('login-btn');
  err.textContent='';
  if(!u||!p){err.textContent='Fill in both fields.';return;}
  btn.disabled=true;btn.textContent='Signing in...';
  try{
    const r=await fetch('/api/admin/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})});
    const d=await r.json();
    if(d.ok) window.location.href='/dashboard';
    else err.textContent=d.error||'Incorrect credentials.';
  }catch{err.textContent='Network error.';}
  finally{btn.disabled=false;btn.textContent='Sign in';}
}
</script>
</body>
</html>
