<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>404 — Vvshenok</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="/style.css"/>
<style>
.page-404 {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  text-align: center;
  padding: 2rem;
  gap: 0;
}
.err-code {
  font-family: var(--mono);
  font-size: clamp(6rem, 20vw, 12rem);
  font-weight: 700;
  color: var(--line2);
  letter-spacing: -0.05em;
  line-height: 1;
  margin-bottom: 1rem;
}
.err-code em {
  color: var(--accent);
  font-style: normal;
}
.err-title {
  font-size: 1.1rem;
  font-weight: 600;
  color: var(--white);
  margin-bottom: 0.5rem;
}
.err-sub {
  font-size: 0.85rem;
  color: var(--muted);
  margin-bottom: 2rem;
  max-width: 340px;
  line-height: 1.7;
}
.err-btns {
  display: flex;
  gap: 0.75rem;
  justify-content: center;
}
</style>
</head>
<body>
<div class="page-404">
  <div class="err-code">4<em>0</em>4</div>
  <div class="err-title">Page not found</div>
  <p class="err-sub">Looks like this script doesn't exist. Maybe it got deleted, or the URL is wrong.</p>
  <div class="err-btns">
    <a href="/" class="btn btn-solid">Back to home</a>
    <a href="/#contact" class="btn btn-ghost">Contact me</a>
  </div>
</div>
</body>
</html>
